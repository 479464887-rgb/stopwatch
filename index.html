<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Stopwatch — DevKit Tools</title>
  <meta name="description" content="在线秒表计时器 - 精确计时，支持计圈/暂停/重置">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #58a6ff
    }

    .logo span {
      color: #f0c040
    }

    header .badge {
      font-size: 10px;
      background: #daa520;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1
    }

    .tool-wrapper {
      padding: 20px 0
    }

    footer {
      padding: 16px 24px;
      border-top: 1px solid #21262d;
      text-align: center;
      font-size: 12px;
      color: #484f58
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
      margin: 0 8px
    }

    .btn-primary:hover {
      background: #2ea043 !important
    }

    .btn:hover {
      background: #30363d !important
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #58a6ff !important
    }

    .btn {
      font-family: inherit
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div>
    <div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div>
  </header>
  <main>
    <h1 style="font-size:24px;margin-bottom:4px">Online Stopwatch</h1>
    <p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线秒表计时器 - 精确计时，支持计圈/暂停/重置</p>
    <div class="tool-wrapper">
      <div style="text-align:center;padding:32px 0">
        <div id="sw-display" style="font-size:72px;font-weight:700;font-family:mono;color:#f0f6fc;letter-spacing:4px;margin-bottom:24px">00:00:00.00</div>
        <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px"><button id="sw-start" class="btn btn-primary" style="padding:14px 40px;background:#238636;color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:18px;font-weight:700" onclick="swToggle()">▶ 开始</button><button id="sw-lap" class="btn" style="padding:14px 30px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:12px;cursor:pointer;font-size:16px;display:none" onclick="swLap()">🏁 计圈</button><button class="btn" style="padding:14px 30px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:12px;cursor:pointer;font-size:16px" onclick="swReset()">↺ 重置</button></div>
        <div id="sw-laps" style="max-height:200px;overflow:auto;text-align:left"></div>
      </div>
    </div>
  </main>
  <footer><a href="https://github.com/479464887-rgb/stopwatch">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer>
  <script>
    let swStart = 0,
      swElapsed = 0,
      swRunning = !1,
      swLaps = [],
      swInterval;

    function swToggle() {
      swRunning ? swPause() : swStartTimer()
    }

    function swStartTimer() {
      swRunning = !0;
      swStart = Date.now() - swElapsed;
      swInterval = setInterval(swUpdate, 10);
      document.getElementById('sw-start').textContent = '⏸ 暂停';
      document.getElementById('sw-start').style.background = '#d29922';
      document.getElementById('sw-lap').style.display = 'inline-block'
    }

    function swPause() {
      swRunning = !1;
      clearInterval(swInterval);
      swElapsed = Date.now() - swStart;
      document.getElementById('sw-start').textContent = '▶ 继续';
      document.getElementById('sw-start').style.background = '#238636'
    }

    function swReset() {
      swRunning = !1;
      clearInterval(swInterval);
      swElapsed = 0;
      swLaps = [];
      document.getElementById('sw-display').textContent = '00:00:00.00';
      document.getElementById('sw-start').textContent = '▶ 开始';
      document.getElementById('sw-start').style.background = '#238636';
      document.getElementById('sw-lap').style.display = 'none';
      document.getElementById('sw-laps').innerHTML = ''
    }

    function swUpdate() {
      const t = Date.now() - swStart;
      document.getElementById('sw-display').textContent = swFormat(t)
    }

    function swFormat(t) {
      const ms = Math.floor(t % 1000 / 10);
      const s = Math.floor(t / 1000) % 60;
      const m = Math.floor(t / 60000) % 60;
      const h = Math.floor(t / 3600000);
      return [h, m, s].map(x => String(x).padStart(2, '0')).join(':') + '.' + String(ms).padStart(2, '0')
    }

    function swLap() {
      const t = Date.now() - swStart;
      swLaps.push(t);
      const html = swLaps.map((t, i) => {
        const prev = i > 0 ? swLaps[i - 1] : 0;
        const split = t - prev;
        return `<div style="display:flex;justify-content:space-between;padding:8px 16px;margin-bottom:2px;background:#161b22;border:1px solid #30363d;border-radius:6px;font-family:mono;font-size:14px"><span>圈 ${i+1}</span><span>${swFormat(t)}</span><span style="color:#8b949e">+${swFormat(split)}</span></div>`
      }).reverse().join('');
      document.getElementById('sw-laps').innerHTML = html
    }
  </script>
</body>

</html>
